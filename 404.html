<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | Dublin Website Company</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --ink: #0A0A0A;
      --mid: #555;
      --line: #E8E8E8;
      --bg: #F7F5F0;
      --white: #FFFFFF;
      --green: #169B62;
      --green2: #0f7a4a;
      --serif: 'DM Serif Display', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      overflow: hidden;
    }

    .bg-circle {
      position: absolute;
      width: 600px;
      height: 600px;
      border: 80px solid rgba(22,155,98,0.05);
      border-radius: 50%;
      top: -200px;
      right: -150px;
    }

    .wrapper {
      max-width: 720px;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
      font-family: var(--serif);
      font-size: 22px;
      text-decoration: none;
      color: var(--ink);
    }

    .logo-dot {
      width: 38px;
      height: 38px;
      background: var(--green);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }

    .code {
      font-family: var(--serif);
      font-size: clamp(110px, 20vw, 220px);
      line-height: 0.9;
      color: var(--green);
      margin-bottom: 10px;
    }

    h1 {
      font-family: var(--serif);
      font-size: clamp(34px, 5vw, 56px);
      line-height: 1.05;
      margin-bottom: 20px;
    }

    h1 em {
      color: var(--green);
      font-style: italic;
    }

    p {
      font-size: 18px;
      color: var(--mid);
      line-height: 1.8;
      max-width: 560px;
      margin: 0 auto 40px;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .btn-primary,
    .btn-secondary {
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: all .25s ease;
    }

    .btn-primary {
      background: var(--ink);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: white;
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .btn-secondary:hover {
      border-color: var(--ink);
      transform: translateY(-2px);
    }

    .fun-note {
      margin-top: 50px;
      font-size: 14px;
      color: #888;
    }

    @media (max-width: 768px) {
      .actions {
        flex-direction: column;
      }

      .btn-primary,
      .btn-secondary {
        width: 100%;
      }

      p {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>

<div class="bg-circle"></div>

<div class="wrapper">

  <a href="/" class="logo">
    <span class="logo-dot">↗</span>
    Dublin Website Co.
  </a>

  <div class="code">404</div>

  <h1>Looks like this page<br>has gone <em>walkabout</em>.</h1>

  <p>
    The page you're looking for doesn't exist, may have moved,
    or the link is incorrect. Don't worry — the rest of the site
    is still right where it should be.
  </p>

  <div class="actions">
    <a href="/" class="btn-primary">Return Home</a>
    <a href="/#contact" class="btn-secondary">Contact Us</a>
  </div>

  <div class="fun-note">
    Error 404 • Dublin, Ireland 🇮🇪
  </div>

</div>

</body>
</html>
